      <aside class="hidden w-64 shrink-0 lg:block" aria-label="Icon controls">
        <div class="sticky top-20 space-y-6">

          <!-- Search -->
          <div>
            <div class="mb-1.5 flex items-center justify-between">
              <label for="icon-search" class="block text-xs font-semibold uppercase tracking-wider text-muted-foreground">
                Search
              </label>
              <span class="text-xs tabular-nums text-muted-foreground">{{ resultCount() }}/{{ totalCount() }}</span>
            </div>
            <volt-input
              id="icon-search"
              placeholder="Search icons..."
              [value]="search()"
              (valueChange)="search.set($event)"
            />
          </div>

          <!-- Category -->
          <div>
            <p class="mb-2 text-xs font-semibold uppercase tracking-wider text-muted-foreground">Category</p>
            <div class="grid grid-cols-2 gap-1.5" role="radiogroup" aria-label="Icon category">
              @for (item of categories(); track item.value) {
                <button
                  type="button"
                  role="radio"
                  [attr.aria-checked]="category() === item.value"
                  class="min-h-8 rounded-md border px-2 text-left text-xs font-medium transition-colors"
                  [class]="category() === item.value
                    ? 'border-primary bg-primary text-primary-foreground'
                    : 'border-border text-secondary-foreground hover:border-primary hover:text-foreground'"
                  (click)="category.set(item.value)"
                >
                  {{ item.label }}
                </button>
              }
            </div>
          </div>

          <!-- Size -->
          <div>
            <p class="mb-1.5 text-xs font-semibold uppercase tracking-wider text-muted-foreground">Size</p>
            <app-size-picker [(size)]="size" />
          </div>

          <!-- Stroke -->
          <div>
            <div class="mb-1.5 flex items-center justify-between">
              <label for="stroke-slider" class="text-xs font-semibold uppercase tracking-wider text-muted-foreground">
                Stroke
              </label>
              <span class="tabular-nums text-sm font-medium text-foreground">{{ strokeWidth() }}</span>
            </div>
            <volt-slider
              id="stroke-slider"
              [value]="strokeWidth()"
              (valueChange)="strokeWidth.set($event)"
              [min]="0.5"
              [max]="3"
              [step]="0.5"
            />
          </div>

          <!-- Animation -->
          <div>
            <p class="mb-1.5 text-xs font-semibold uppercase tracking-wider text-muted-foreground">Animation</p>
            <app-animation-picker [(animate)]="animate" />
          </div>

          @if (animate()) {
            <p class="rounded-lg border border-primary bg-primary px-3 py-2.5 text-xs text-primary-foreground dark:border-primary dark:bg-primary/40 dark:text-primary">
              Previewing semantic animation on all icons. Click any to copy.
            </p>
          }

        </div>
      </aside>
